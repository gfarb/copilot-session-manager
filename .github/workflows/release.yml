name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
    env:
      CGO_ENABLED: "0"
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: Test
        run: go test ./...

      - name: Build
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o dist/csm .

      - name: Package
        working-directory: dist
        run: |
          ASSET="csm-${GOOS}-${GOARCH}.tar.gz"
          tar -czf "$ASSET" csm
          sha256sum "$ASSET" > "$ASSET.sha256"
          ls -l

      - uses: actions/upload-artifact@v4
        with:
          name: csm-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/csm-*.tar.gz
            dist/csm-*.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show artifacts
        run: ls -l dist/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/csm-*.tar.gz
            dist/csm-*.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
